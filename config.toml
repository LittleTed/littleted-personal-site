# Hugo Configuration - Terminal Theme
baseURL = "https://littleted.github.io/aboutme/"
languageCode = "zh-cn"
title = "LittleTed | 嵌入式开发者 · 技术创作者"
theme = "hugo-terminal"

# Site parameters
[params]
  # Basic info
  name = "LittleTed"
  headline = "嵌入式开发者 & 技术创作者"
  bio = "热爱嵌入式开发，喜欢分享技术经验，记录项目历程"
  location = "中国"
  
  # Appearance
  themeColor = "#3a7bd5"
  backgroundColor = "#1a1a1a"
  backgroundImage = ""
  font = "JetBrains Mono, monospace"
  
  # Features
  showThemeSwitcher = true
  showScrollTop = true
  showReadingTime = true
  showTableOfContents = true
  showBreadCrumbs = true
  
  # Creative elements
  particles = true
  typewriter = true
  glitchEffect = false
  
  # Social links
  [[params.social]]
    name = "Gitee"
    icon = "fab fa-git-alt"
    url = "https://gitee.com/little_ted"
  
  [[params.social]]
    name = "GitHub"
    icon = "fab fa-github"
    url = "https://github.com/LittleTed"
  
  [[params.social]]
    name = "Email"
    icon = "fas fa-envelope"
    url = "mailto:xiaoxi.ted@foxmail.com"

# Menu configuration
[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
  
  [[menu.main]]
    identifier = "projects"
    name = "项目"
    url = "/projects/"
    weight = 2
  
  [[menu.main]]
    identifier = "blog"
    name = "博客"
    url = "/blog/"
    weight = 3
  
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4
  
  [[menu.main]]
    identifier = "contact"
    name = "联系"
    url = "/contact/"
    weight = 5

# Build settings
[build]
  writeStats = true
  useResourceCacheWhen = "always"

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Image processing
[imaging]
  quality = 85
  anchor = "smart"

# Security headers
[security]
  enable = true
  [security.hsts]
    maxAge = 31536000
    includeSubDomains = true
    preload = true

# Markdown processing
[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = false
  
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      hardWraps = false
      xhtml = false
  
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

# Sitemap
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# RSS
[services]
  [services.rss]
    limit = 20

# Google Analytics (optional)
# [services.googleAnalytics]
#   id = "UA-XXXXXXXXX-X"

# Disqus (optional)
# [services.disqus]
#   shortname = "your-disqus-shortname"

# Custom parameters for Terminal theme
[params.terminal]
  accentColor = "#3a7bd5"
  fontSize = "16px"
  lineHeight = "1.6"
  cursor = "block"
  blink = true
  showHostname = true
  showUser = true
  prompt = "➜"
  
  [params.terminal.commands]
    [[params.terminal.commands.list]]
      command = "ls"
      description = "列出内容"
    
    [[params.terminal.commands.list]]
      command = "cd projects"
      description = "进入项目目录"
    
    [[params.terminal.commands.list]]
      command = "cat about.md"
      description = "查看个人介绍"
    
    [[params.terminal.commands.list]]
      command = "help"
      description = "显示帮助信息"